name: Scrape Job Boards

on:
  schedule:
    - cron: '0 6 * * *'    # Daily at 6am UTC — Tier 1 job boards
    - cron: '0 8 * * 1'    # Weekly Monday 8am UTC — Tier 2 career pages
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Which scraper to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - jobs
          - career-pages-tier2
          - h1b
          - perm
          - bls
          - sec

jobs:
  # ── Tier 1: Daily job board scraping (Greenhouse / Lever / Ashby / Workday) ──
  scrape-tier1:
    runs-on: ubuntu-latest
    name: Tier 1 — Job Boards (Daily)
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.scraper == 'all' ||
      github.event.inputs.scraper == 'jobs'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Job Board Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py

  # ── Tier 2: Weekly career page scraping (SaaS peers) ──────────────────────
  scrape-tier2:
    runs-on: ubuntu-latest
    name: Tier 2 — Career Pages (Weekly)
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1') ||
      github.event.inputs.scraper == 'all' ||
      github.event.inputs.scraper == 'career-pages-tier2'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Career Page Scraper (Tier 2)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python career_page_scraper.py

  # ── Government data: H-1B, PERM, BLS, SEC ─────────────────────────────────
  scrape-gov:
    runs-on: ubuntu-latest
    name: Government Data
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.scraper == 'all' ||
      github.event.inputs.scraper == 'h1b' ||
      github.event.inputs.scraper == 'perm' ||
      github.event.inputs.scraper == 'bls' ||
      github.event.inputs.scraper == 'sec'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run H-1B Scraper
        if: >
          github.event.inputs.scraper == 'all' ||
          github.event.inputs.scraper == 'h1b' ||
          github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python h1b_scraper.py

      - name: Run PERM Scraper
        if: >
          github.event.inputs.scraper == 'all' ||
          github.event.inputs.scraper == 'perm' ||
          github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python perm_scraper.py

      - name: Run BLS OEWS Scraper
        if: >
          github.event.inputs.scraper == 'all' ||
          github.event.inputs.scraper == 'bls' ||
          github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python bls_scraper.py

      - name: Run SEC Proxy Scraper
        if: >
          github.event.inputs.scraper == 'all' ||
          github.event.inputs.scraper == 'sec' ||
          github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sec_scraper.py
